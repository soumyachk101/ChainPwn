<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280">
  <rect width="400" height="280" fill="#0d1117" rx="8"/>
  <text x="200" y="30" fill="#c9d1d9" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Balance Drain — EtherStore.sol</text>
  <!-- Chart area -->
  <rect x="60" y="50" width="320" height="180" fill="#161b22" stroke="#30363d" rx="4"/>
  <!-- Grid lines -->
  <line x1="60" y1="90" x2="380" y2="90" stroke="#21262d" stroke-width="0.5"/>
  <line x1="60" y1="130" x2="380" y2="130" stroke="#21262d" stroke-width="0.5"/>
  <line x1="60" y1="170" x2="380" y2="170" stroke="#21262d" stroke-width="0.5"/>
  <line x1="60" y1="210" x2="380" y2="210" stroke="#21262d" stroke-width="0.5"/>
  <!-- Y axis labels -->
  <text x="50" y="55" fill="#8b949e" font-family="monospace" font-size="8" text-anchor="end">10 ETH</text>
  <text x="50" y="95" fill="#8b949e" font-family="monospace" font-size="8" text-anchor="end">7.5</text>
  <text x="50" y="135" fill="#8b949e" font-family="monospace" font-size="8" text-anchor="end">5.0</text>
  <text x="50" y="175" fill="#8b949e" font-family="monospace" font-size="8" text-anchor="end">2.5</text>
  <text x="50" y="215" fill="#8b949e" font-family="monospace" font-size="8" text-anchor="end">0 ETH</text>
  <!-- Contract balance bars -->
  <rect x="90" y="55" width="40" height="155" fill="#58a6ff" rx="2" opacity="0.8"/>
  <text x="110" y="250" fill="#8b949e" font-family="monospace" font-size="8" text-anchor="middle">Before</text>
  <!-- Attacker balance bars -->
  <rect x="160" y="210" width="40" height="0" fill="#ff4757" rx="2" opacity="0.8"/>
  <text x="180" y="250" fill="#8b949e" font-family="monospace" font-size="8" text-anchor="middle">Attack</text>
  <!-- After - contract drained -->
  <rect x="230" y="210" width="40" height="0" fill="#58a6ff" rx="2" opacity="0.4"/>
  <text x="250" y="250" fill="#8b949e" font-family="monospace" font-size="8" text-anchor="middle">After</text>
  <!-- Attacker gains -->
  <rect x="300" y="55" width="40" height="155" fill="#2ed573" rx="2" opacity="0.8"/>
  <text x="320" y="250" fill="#8b949e" font-family="monospace" font-size="8" text-anchor="middle">Attacker</text>
  <!-- Labels -->
  <text x="110" y="48" fill="#58a6ff" font-family="sans-serif" font-size="8" font-weight="bold" text-anchor="middle">10.0 ETH</text>
  <text x="320" y="48" fill="#2ed573" font-family="sans-serif" font-size="8" font-weight="bold" text-anchor="middle">10.0 ETH</text>
  <!-- Arrow showing drain -->
  <path d="M 130 100 Q 180 80 230 100" fill="none" stroke="#ff4757" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="180" y="78" fill="#ff4757" font-family="sans-serif" font-size="8" text-anchor="middle">DRAINED</text>
  <!-- Legend -->
  <rect x="120" y="260" width="8" height="8" fill="#58a6ff" rx="1"/>
  <text x="132" y="268" fill="#8b949e" font-family="sans-serif" font-size="8">Contract</text>
  <rect x="190" y="260" width="8" height="8" fill="#2ed573" rx="1"/>
  <text x="202" y="268" fill="#8b949e" font-family="sans-serif" font-size="8">Attacker</text>
  <!-- Placeholder -->
  <rect x="100" y="260" width="200" height="18" fill="rgba(13,17,23,0.9)" stroke="#30363d" rx="4"/>
  <text x="200" y="272" fill="#8b949e" font-family="sans-serif" font-size="8" text-anchor="middle">Replace: docs/assets/screenshot-balance-chart.png</text>
</svg>
