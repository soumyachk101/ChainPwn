<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="land" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4757"/>
      <stop offset="100%" style="stop-color:#00d2ff"/>
    </linearGradient>
  </defs>
  <rect width="400" height="280" fill="url(#land)" rx="8"/>
  <!-- Grid pattern -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#21262d" stroke-width="0.5"/>
  </pattern>
  <rect width="400" height="280" fill="url(#grid)" rx="8"/>
  <!-- Title -->
  <text x="200" y="80" fill="url(#glow)" font-family="sans-serif" font-size="28" font-weight="900" text-anchor="middle">VulnForge</text>
  <text x="200" y="105" fill="#8b949e" font-family="sans-serif" font-size="11" text-anchor="middle">AI-Powered Smart Contract Exploit Simulator</text>
  <!-- CTA -->
  <rect x="130" y="125" width="140" height="36" fill="#ff4757" rx="18"/>
  <text x="200" y="148" fill="#fff" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Start Scanning</text>
  <!-- Shield icon -->
  <polygon points="200,40 220,50 220,65 200,75 180,65 180,50" fill="none" stroke="url(#glow)" stroke-width="2"/>
  <!-- Stats -->
  <text x="80" y="195" fill="#8b949e" font-family="sans-serif" font-size="9" text-anchor="middle">VULNERABILITIES</text>
  <text x="80" y="215" fill="#ff4757" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">12+</text>
  <text x="200" y="195" fill="#8b949e" font-family="sans-serif" font-size="9" text-anchor="middle">DEMO CONTRACTS</text>
  <text x="200" y="215" fill="#ffa502" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">3</text>
  <text x="320" y="195" fill="#8b949e" font-family="sans-serif" font-size="9" text-anchor="middle">PIPELINE PHASES</text>
  <text x="320" y="215" fill="#2ed573" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">3</text>
  <!-- Placeholder -->
  <rect x="100" y="240" width="200" height="25" fill="rgba(13,17,23,0.9)" stroke="#30363d" rx="6"/>
  <text x="200" y="257" fill="#8b949e" font-family="sans-serif" font-size="9" text-anchor="middle">Replace: docs/assets/screenshot-landing.png</text>
</svg>
