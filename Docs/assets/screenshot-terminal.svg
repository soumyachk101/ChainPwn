  <text x="15" y="90" fill="#c9d1d9" font-family="monospace" font-size="9">Contract deployed at: 0x5FbD...51e8</text>
  <text x="15" y="107" fill="#c9d1d9" font-family="monospace" font-size="9">Funding with 10.0 ETH...</text>
  <text x="15" y="124" fill="#58a6ff" font-family="monospace" font-size="9">[BALANCE] BEFORE: 10.0 ETH</text>
  <text x="15" y="141" fill="#c9d1d9" font-family="monospace" font-size="9">Deploying Attacker...</text>
  <text x="15" y="158" fill="#c9d1d9" font-family="monospace" font-size="9">Calling attack()...</text>
  <text x="15" y="172" fill="#c9d1d9" font-family="monospace" font-size="9">  Re-enter #1: withdraw()</text>
  <text x="15" y="186" fill="#c9d1d9" font-family="monospace" font-size="9">  Re-enter #2: withdraw()</text>
  <text x="15" y="200" fill="#c9d1d9" font-family="monospace" font-size="9">  Re-enter #3: withdraw()</text>
  <text x="15" y="217" fill="#58a6ff" font-family="monospace" font-size="9">[BALANCE] AFTER:  0.0 ETH</text>
  <text x="15" y="237" fill="#2ed573" font-family="monospace" font-size="9" font-weight="bold">&#10004; EXPLOIT SUCCESS — 10.0 ETH drained</text>
  <rect x="15" y="248" width="7" height="12" fill="#c9d1d9">
    <animate attributeName="opacity" values="1;0" dur="1s" repeatCount="indefinite"/>
  </rect>
  <!-- Placeholder -->
