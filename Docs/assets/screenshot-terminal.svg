<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280">
  <rect width="400" height="280" fill="#0d1117" rx="8"/>
  <!-- Terminal chrome -->
  <rect x="0" y="0" width="400" height="24" fill="#21262d" rx="8"/>
  <rect x="0" y="14" width="400" height="10" fill="#21262d"/>
  <circle cx="15" cy="12" r="5" fill="#ff5f57"/>
  <circle cx="31" cy="12" r="5" fill="#febc2e"/>
  <circle cx="47" cy="12" r="5" fill="#28c840"/>
  <text x="180" y="16" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle">exploit-terminal</text>
  <!-- Terminal content -->
  <text x="15" y="45" fill="#2ed573" font-family="monospace" font-size="9">$ npx hardhat run exploit.js</text>
  <text x="15" y="62" fill="#8b949e" font-family="monospace" font-size="9">Compiling contracts...</text>
