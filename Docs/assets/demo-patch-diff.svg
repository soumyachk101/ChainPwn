<svg xmlns="http://www.w3.org/2000/svg" width="700" height="300" viewBox="0 0 700 300">
  <rect width="700" height="300" fill="#0d1117" rx="8"/>
  <rect x="20" y="20" width="660" height="3" fill="#2ed573" rx="1.5"/>
  <text x="40" y="55" fill="#2ed573" font-family="monospace" font-size="12" font-weight="bold">Phase 3: PATCH</text>
  <text x="40" y="78" fill="#8b949e" font-family="monospace" font-size="11">Generating patched contract...</text>
  <!-- Diff view -->
  <rect x="30" y="90" width="315" height="160" fill="#161b22" stroke="#30363d" rx="4"/>
  <text x="40" y="108" fill="#ff4757" font-family="sans-serif" font-size="10" font-weight="bold">Original</text>
  <text x="40" y="128" fill="#c9d1d9" font-family="monospace" font-size="10">  function withdraw() public {</text>
  <text x="40" y="143" fill="#c9d1d9" font-family="monospace" font-size="10">    uint256 bal = balances[msg.sender];</text>
  <text x="40" y="158" fill="#c9d1d9" font-family="monospace" font-size="10">    require(bal > 0);</text>
  <rect x="35" y="148" width="305" height="14" fill="rgba(255,71,87,0.15)"/>
  <text x="40" y="173" fill="#ff6b81" font-family="monospace" font-size="10">    (bool sent,) = msg.sender.call{value: bal}("");</text>
  <rect x="35" y="163" width="305" height="14" fill="rgba(255,71,87,0.15)"/>
  <text x="40" y="188" fill="#ff6b81" font-family="monospace" font-size="10">    balances[msg.sender] = 0;</text>

  <rect x="355" y="90" width="315" height="160" fill="#161b22" stroke="#30363d" rx="4"/>
  <text x="365" y="108" fill="#2ed573" font-family="sans-serif" font-size="10" font-weight="bold">Patched</text>
  <text x="365" y="128" fill="#c9d1d9" font-family="monospace" font-size="10">  function withdraw() public {</text>
  <text x="365" y="143" fill="#c9d1d9" font-family="monospace" font-size="10">    uint256 bal = balances[msg.sender];</text>
  <text x="365" y="158" fill="#c9d1d9" font-family="monospace" font-size="10">    require(bal > 0);</text>
  <rect x="360" y="148" width="305" height="14" fill="rgba(46,213,115,0.15)"/>
  <text x="365" y="173" fill="#7bed9f" font-family="monospace" font-size="10">    balances[msg.sender] = 0; // FIX: CEI</text>
  <rect x="360" y="163" width="305" height="14" fill="rgba(46,213,115,0.15)"/>
  <text x="365" y="188" fill="#7bed9f" font-family="monospace" font-size="10">    (bool sent,) = msg.sender.call{value: bal}("");</text>
  <text x="365" y="205" fill="#c9d1d9" font-family="monospace" font-size="10">  } // ReentrancyGuard applied</text>

  <text x="40" y="275" fill="#2ed573" font-family="monospace" font-size="11">&#10004; Patch complete — 1 fix applied</text>
  <rect x="200" y="268" width="300" height="25" fill="rgba(13,17,23,0.9)" stroke="#30363d" rx="6"/>
