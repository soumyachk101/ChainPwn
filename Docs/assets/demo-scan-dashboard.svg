<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4757;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00d2ff;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="8"/>
  <rect x="20" y="20" width="760" height="4" fill="url(#accent)" rx="2"/>
  <!-- Left panel - Editor -->
  <rect x="30" y="50" width="350" height="320" fill="#161b22" stroke="#30363d" stroke-width="1" rx="6"/>
  <rect x="30" y="50" width="350" height="30" fill="#21262d" rx="6"/>
  <circle cx="48" cy="65" r="5" fill="#ff5f57"/>
  <circle cx="64" cy="65" r="5" fill="#febc2e"/>
  <circle cx="80" cy="65" r="5" fill="#28c840"/>
  <text x="100" y="70" fill="#8b949e" font-family="monospace" font-size="11">EtherStore.sol</text>
  <text x="50" y="105" fill="#8b949e" font-family="monospace" font-size="11">1</text>
  <text x="70" y="105" fill="#c9d1d9" font-family="monospace" font-size="11">pragma solidity ^0.8.0;</text>
  <text x="50" y="122" fill="#8b949e" font-family="monospace" font-size="11">2</text>
  <text x="70" y="122" fill="#c9d1d9" font-family="monospace" font-size="11">contract EtherStore {</text>
  <text x="50" y="139" fill="#8b949e" font-family="monospace" font-size="11">3</text>
  <text x="50" y="156" fill="#8b949e" font-family="monospace" font-size="11">4</text>
  <text x="70" y="156" fill="#c9d1d9" font-family="monospace" font-size="11">  mapping(address =&gt;</text>
  <text x="50" y="173" fill="#8b949e" font-family="monospace" font-size="11">5</text>
  <text x="70" y="173" fill="#c9d1d9" font-family="monospace" font-size="11">    uint256) balances;</text>
  <!-- Highlighted vulnerable line -->
  <rect x="45" y="195" width="320" height="17" fill="rgba(255,71,87,0.15)" rx="2"/>
  <text x="50" y="208" fill="#8b949e" font-family="monospace" font-size="11">15</text>
  <text x="70" y="208" fill="#ff6b81" font-family="monospace" font-size="11">    (bool sent, ) = msg.sender</text>
  <rect x="45" y="212" width="320" height="17" fill="rgba(255,71,87,0.15)" rx="2"/>
  <text x="50" y="225" fill="#8b949e" font-family="monospace" font-size="11">16</text>
  <text x="70" y="225" fill="#ff6b81" font-family="monospace" font-size="11">      .call{value: bal}("");</text>
  <!-- Vuln marker -->
  <rect x="310" y="198" width="60" height="16" fill="#ff4757" rx="8"/>
  <text x="318" y="210" fill="#fff" font-family="sans-serif" font-size="9" font-weight="bold">REENTER</text>
  <!-- Right panel - Cards -->
  <rect x="400" y="50" width="370" height="90" fill="#161b22" stroke="#ff4757" stroke-width="1" rx="6"/>
  <text x="420" y="75" fill="#ff4757" font-family="sans-serif" font-size="12" font-weight="bold">CRITICAL</text>
  <text x="420" y="95" fill="#c9d1d9" font-family="sans-serif" font-size="14" font-weight="bold">Reentrancy in withdraw()</text>
  <text x="420" y="115" fill="#8b949e" font-family="sans-serif" font-size="11">Lines 15-22 | CWE-841</text>
  <text x="420" y="130" fill="#8b949e" font-family="sans-serif" font-size="11">External call before state update</text>

  <rect x="400" y="155" width="370" height="75" fill="#161b22" stroke="#ffa502" stroke-width="1" rx="6"/>
  <text x="420" y="178" fill="#ffa502" font-family="sans-serif" font-size="12" font-weight="bold">HIGH</text>
  <text x="420" y="198" fill="#c9d1d9" font-family="sans-serif" font-size="14" font-weight="bold">Integer Overflow in mint()</text>
  <text x="420" y="218" fill="#8b949e" font-family="sans-serif" font-size="11">Lines 8-11 | Solidity &lt;0.8.0</text>

  <!-- Risk gauge -->
  <rect x="400" y="245" width="370" height="125" fill="#161b22" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="540" y="272" fill="#8b949e" font-family="sans-serif" font-size="11" text-anchor="middle">RISK SCORE</text>
  <circle cx="540" cy="320" r="35" fill="none" stroke="#30363d" stroke-width="6"/>
  <circle cx="540" cy="320" r="35" fill="none" stroke="#ff4757" stroke-width="6" stroke-dasharray="180 220" stroke-linecap="round" transform="rotate(-90 540 320)"/>
  <text x="540" y="328" fill="#ff4757" font-family="sans-serif" font-size="22" font-weight="bold" text-anchor="middle">82</text>
  <text x="490" y="355" fill="#ff4757" font-family="sans-serif" font-size="10">CRITICAL</text>

  <!-- Status bar -->
  <rect x="30" y="385" width="350" height="20" fill="none"/>
  <text x="30" y="398" fill="#2ed573" font-family="monospace" font-size="10">&#9679; VulnForge Ready</text>
  <text x="380" y="398" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="end">3 vulnerabilities found</text>

  <!-- Placeholder notice -->
  <rect x="250" y="175" width="300" height="50" fill="rgba(13,17,23,0.9)" stroke="#30363d" rx="8"/>
  <text x="400" y="196" fill="#8b949e" font-family="sans-serif" font-size="12" text-anchor="middle">Replace with real screenshot</text>
  <text x="400" y="214" fill="#58a6ff" font-family="sans-serif" font-size="10" text-anchor="middle">docs/assets/demo-scan-dashboard.gif</text>
</svg>
