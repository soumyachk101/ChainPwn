<svg xmlns="http://www.w3.org/2000/svg" width="700" height="300" viewBox="0 0 700 300">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  <rect width="700" height="300" fill="url(#bg2)" rx="8"/>
  <rect x="20" y="20" width="660" height="3" fill="#9b59b6" rx="1.5"/>
  <!-- Terminal output -->
  <text x="40" y="55" fill="#9b59b6" font-family="monospace" font-size="12" font-weight="bold">Phase 1: ANALYZE</text>
  <text x="40" y="80" fill="#2ed573" font-family="monospace" font-size="11">$ vulnforge analyze EtherStore.sol</text>
  <text x="40" y="100" fill="#8b949e" font-family="monospace" font-size="11">Uploading contract to Claude AI...</text>
  <text x="40" y="117" fill="#c9d1d9" font-family="monospace" font-size="11">Analyzing 47 lines of Solidity...</text>
  <text x="40" y="137" fill="#ff4757" font-family="monospace" font-size="11">[CRITICAL] Reentrancy in withdraw() — Lines 15-22</text>
  <text x="40" y="154" fill="#ffa502" font-family="monospace" font-size="11">[HIGH]     Missing checks-effects — Line 19</text>
  <text x="40" y="174" fill="#2ed573" font-family="monospace" font-size="11">&#10003; Analysis complete — 2 vulnerabilities found</text>
  <text x="40" y="194" fill="#58a6ff" font-family="monospace" font-size="11">Overall Risk: CRITICAL | Confidence: HIGH</text>
  <text x="40" y="214" fill="#8b949e" font-family="monospace" font-size="11">Report saved to session: sess_abc123</text>
  <!-- Cursor blink -->
  <rect x="40" y="232" width="8" height="14" fill="#c9d1d9">
    <animate attributeName="opacity" values="1;0" dur="1s" repeatCount="indefinite"/>
  </rect>
  <!-- Placeholder notice -->
  <rect x="200" y="255" width="300" height="30" fill="rgba(13,17,23,0.9)" stroke="#30363d" rx="6"/>
  <text x="350" y="275" fill="#8b949e" font-family="sans-serif" font-size="10" text-anchor="middle">Replace with real GIF: docs/assets/demo-analyze.gif</text>
